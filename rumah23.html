
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>rumah23</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22d3ee;
      --accent2: #a78bfa;
      --danger: #ef4444;
      --ok: #10b981;
      --warning: #f59e0b;
      --d4: #fbbf24;
      --d3: #38bdf8;
      --d2: #8b5cf6;
    }
    body {
      margin: 0;
      background: radial-gradient(1200px 800px at 20% 20%, #0b1324, #0a1020 60%, #070b18);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      line-height: 1.6;
      padding: 24px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    .back-home {
      text-align: right;
      margin-bottom: 16px;
    }
    .back-home a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin: 0 0 24px;
      letter-spacing: 0.2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .card {
      background: linear-gradient(180deg, #121826, #0f1624);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .input-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
    }
    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 0.95rem;
      text-align: center;
    }
    #inputAS label { color: var(--d4); }
    #inputKOP label { color: var(--d3); }
    #inputKEPALA label { color: var(--d2); }
    #inputEKOR label { color: var(--d2); }
    input[type="text"] {
      width: 100%;
      background: #0c1220;
      color: var(--text);
      border: 2px solid rgba(34, 211, 238, 0.3);
      border-radius: 12px;
      padding: 16px 12px;
      font-size: 1.3rem;
      font-weight: bold;
      text-align: center;
      outline: none;
      transition: all 0.2s ease;
    }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.2);
      background: #0d1426;
    }
    input[type="text"]:valid {
      border-color: var(--ok);
    }
    .btn-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    button {
      font-weight: 700;
      border: none;
      border-radius: 10px;
      padding: 12px 10px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 0.95rem;
    }
    button:active {
      transform: translateY(2px);
      opacity: 0.9;
    }
    .btn-haju {
      background: linear-gradient(90deg, #f59e0b, #ea580c);
      color: white;
      font-size: 1.1rem;
    }
    .btn-salin {
      background: linear-gradient(90deg, #10b981, #059669);
      color: white;
    }
    .btn-simpan {
      background: linear-gradient(90deg, #22d3ee, #06b6d4);
      color: #0b1020;
    }
    .btn-reset {
      background: linear-gradient(90deg, #6b7280, #4b5563);
      color: white;
    }
    .results-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }
    .result-section {
      background: rgba(0,0,0,0.25);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .result-label {
      display: block;
      font-weight: 700;
      margin-bottom: 10px;
      font-size: 1.1rem;
      text-align: center;
      padding: 6px;
      border-radius: 8px;
    }
    .label-4d {
      background: linear-gradient(90deg, rgba(251, 191, 36, 0.15), rgba(245, 158, 11, 0.15));
      color: var(--d4);
      border: 1px solid rgba(251, 191, 36, 0.3);
    }
    .label-3d {
      background: linear-gradient(90deg, rgba(56, 189, 248, 0.15), rgba(6, 182, 212, 0.15));
      color: var(--d3);
      border: 1px solid rgba(56, 189, 248, 0.3);
    }
    .label-2d {
      background: linear-gradient(90deg, rgba(139, 92, 246, 0.15), rgba(124, 58, 237, 0.15));
      color: var(--d2);
      border: 1px solid rgba(139, 92, 246, 0.3);
    }
    .result-value {
      font-family: monospace;
      font-size: 1.05rem;
      font-weight: bold;
      word-break: break-all;
      min-height: 28px;
      max-height: 150px;
      overflow-y: auto;
      padding: 10px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      text-align: center;
      line-height: 1.6;
    }
    .status {
      text-align: center;
      min-height: 24px;
      margin: 12px 0;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .success { color: var(--ok); }
    .error { color: var(--danger); }
    .info { color: var(--accent); }
    @media (max-width: 520px) {
      .input-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .btn-row {
        grid-template-columns: repeat(2, 1fr);
      }
      .results-container {
        grid-template-columns: 1fr;
      }
      h1 { font-size: 1.5rem; }
      input[type="text"] { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="back-home">
      <a href="index.html">← Kembali ke Beranda</a>
    </div>

    <h1>rumah23 — Generator 4D/3D/2D</h1>

    <div class="card">
      <div class="input-grid">
        <div class="input-group" id="inputAS">
          <label>AS<br><small>(max 6 digit)</small></label>
          <input type="text" id="asInput" maxlength="6" placeholder="1234" />
        </div>
        <div class="input-group" id="inputKOP">
          <label>KOP<br><small>(max 6 digit)</small></label>
          <input type="text" id="kopInput" maxlength="6" placeholder="09875" />
        </div>
        <div class="input-group" id="inputKEPALA">
          <label>KEPALA<br><small>(max 6 digit)</small></label>
          <input type="text" id="kepalaInput" maxlength="6" placeholder="23" />
        </div>
        <div class="input-group" id="inputEKOR">
          <label>EKOR<br><small>(max 6 digit)</small></label>
          <input type="text" id="ekorInput" maxlength="6" placeholder="1" />
        </div>
      </div>

      <div class="btn-row">
        <button id="btnHaju" class="btn-haju">🔥 Haju</button>
        <button id="btnSalin" class="btn-salin">📋 Salin Semua</button>
        <button id="btnSimpan" class="btn-simpan">💾 Simpan</button>
        <button id="btnReset" class="btn-reset">🔄 Reset</button>
      </div>

      <div id="status" class="status"></div>

      <div class="results-container">
        <div class="result-section">
          <div class="result-label label-4d">🎯 Hasil 4D</div>
          <div class="result-value" id="hasil4D"></div>
        </div>
        <div class="result-section">
          <div class="result-label label-3d">🎯 Hasil 3D</div>
          <div class="result-value" id="hasil3D"></div>
        </div>
        <div class="result-section">
          <div class="result-label label-2d">🎯 Hasil 2D</div>
          <div class="result-value" id="hasil2D"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="./config-firebase.js"></script>

  <script>
    let currentResult4D = "";
    let currentResult3D = "";
    let currentResult2D = "";
    let currentFullResult = "";

    function showStatus(text, type = "") {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = "status " + type;
      setTimeout(() => {
        if (el.textContent === text) el.textContent = '';
      }, 3000);
    }

    function validateDigitInput(input) {
      input.value = input.value.replace(/[^0-9]/g, '').slice(0, 6);
    }

    // === GENERATOR KOMBINASI LENGKAP (MENGEMBALIKAN OBJEK TERPISAH) ===
    function generateCombinations() {
      const as = document.getElementById('asInput').value.trim();
      const kop = document.getElementById('kopInput').value.trim();
      const kepala = document.getElementById('kepalaInput').value.trim();
      const ekor = document.getElementById('ekorInput').value.trim();

      if (!as || !kop || !kepala || !ekor) {
        return null;
      }

      // Pecah setiap input menjadi array digit unik
      const asDigits = [...new Set(as.split(''))];
      const kopDigits = [...new Set(kop.split(''))];
      const kepalaDigits = [...new Set(kepala.split(''))];
      const ekorDigits = [...new Set(ekor.split(''))];

      // 4D: Semua kombinasi AS × KOP × KEPALA × EKOR
      const d4Combos = [];
      asDigits.forEach(a => {
        kopDigits.forEach(k => {
          kepalaDigits.forEach(p => {
            ekorDigits.forEach(e => {
              d4Combos.push(a + k + p + e);
            });
          });
        });
      });

      // 3D: Semua kombinasi KOP × KEPALA × EKOR
      const d3Combos = [];
      kopDigits.forEach(k => {
        kepalaDigits.forEach(p => {
          ekorDigits.forEach(e => {
            d3Combos.push(k + p + e);
          });
        });
      });

      // 2D: Semua kombinasi KEPALA × EKOR
      const d2Combos = [];
      kepalaDigits.forEach(p => {
        ekorDigits.forEach(e => {
          d2Combos.push(p + e);
        });
      });

      // Format masing-masing bagian (tanpa #)
      const result4D = d4Combos.join('*');
      const result3D = d3Combos.join('*');
      const result2D = d2Combos.join('*');

      // Format lengkap untuk salin/simpan: 4D*4D*...*3D*3D*...*2D*2D#
      const fullResult = `${result4D}*${result3D}*${result2D}#`;

      return {
        d4: result4D,
        d3: result3D,
        d2: result2D,
        full: fullResult,
        counts: {
          d4: d4Combos.length,
          d3: d3Combos.length,
          d2: d2Combos.length
        }
      };
    }

    function salinTeks(teks) {
      if (!teks) {
        showStatus("⚠️ Tidak ada hasil untuk disalin", "error");
        return;
      }

      if (navigator.clipboard) {
        navigator.clipboard.writeText(teks).then(() => {
          showStatus("✅ Disalin ke clipboard!", "success");
        }).catch(() => {
          showStatus("❌ Gagal menyalin", "error");
        });
      } else {
        showStatus("❌ Clipboard tidak didukung", "error");
      }
    }

    function resetForm() {
      document.getElementById('asInput').value = '';
      document.getElementById('kopInput').value = '';
      document.getElementById('kepalaInput').value = '';
      document.getElementById('ekorInput').value = '';
      document.getElementById('hasil4D').textContent = '';
      document.getElementById('hasil3D').textContent = '';
      document.getElementById('hasil2D').textContent = '';
      currentResult4D = "";
      currentResult3D = "";
      currentResult2D = "";
      currentFullResult = "";
      showStatus("🔄 Form direset", "info");
    }

    document.addEventListener('DOMContentLoaded', () => {
      const asInput = document.getElementById('asInput');
      const kopInput = document.getElementById('kopInput');
      const kepalaInput = document.getElementById('kepalaInput');
      const ekorInput = document.getElementById('ekorInput');
      const btnHaju = document.getElementById('btnHaju');
      const btnSalin = document.getElementById('btnSalin');
      const btnSimpan = document.getElementById('btnSimpan');
      const btnReset = document.getElementById('btnReset');
      const hasil4D = document.getElementById('hasil4D');
      const hasil3D = document.getElementById('hasil3D');
      const hasil2D = document.getElementById('hasil2D');

      // Validasi input hanya angka
      asInput.addEventListener('input', () => validateDigitInput(asInput));
      kopInput.addEventListener('input', () => validateDigitInput(kopInput));
      kepalaInput.addEventListener('input', () => validateDigitInput(kepalaInput));
      ekorInput.addEventListener('input', () => validateDigitInput(ekorInput));

      // Tombol Haju - Generate
      btnHaju.addEventListener('click', () => {
        const hasil = generateCombinations();
        if (hasil) {
          // Simpan hasil
          currentResult4D = hasil.d4;
          currentResult3D = hasil.d3;
          currentResult2D = hasil.d2;
          currentFullResult = hasil.full;

          // Tampilkan di UI
          hasil4D.textContent = hasil.d4 || '-';
          hasil3D.textContent = hasil.d3 || '-';
          hasil2D.textContent = hasil.d2 || '-';

          // Status dengan jumlah kombinasi
          const { d4, d3, d2 } = hasil.counts;
          showStatus(`✅ ${d4}x4D | ${d3}x3D | ${d2}x2D`, "success");
        } else {
          showStatus("⚠️ Lengkapi semua kolom (AS/KOP/KEPALA/EKOR)", "error");
        }
      });

      // Tombol Salin - Salin format lengkap
      btnSalin.addEventListener('click', () => {
        salinTeks(currentFullResult);
      });

      // Tombol Simpan
      btnSimpan.addEventListener('click', () => {
        if (!currentFullResult) {
          return showStatus("⚠️ Tidak ada hasil untuk disimpan", "error");
        }

        const as = asInput.value.trim();
        const kop = kopInput.value.trim();
        const kepala = kepalaInput.value.trim();
        const ekor = ekorInput.value.trim();

        const data = {
          as: as,
          kop: kop,
          kepala: kepala,
          ekor: ekor,
          hasil_4d: currentResult4D,
          hasil_3d: currentResult3D,
          hasil_2d: currentResult2D,
          hasil_lengkap: currentFullResult,
          timestamp: firebase.database.ServerValue.TIMESTAMP
        };

        firebase.database().ref('rumah23/data').push(data)
          .then(() => {
            showStatus("✅ Tersimpan ke cloud!", "success");
          })
          .catch(err => {
            console.error('Simpan error:', err);
            showStatus("❌ Gagal menyimpan", "error");
          });
      });

      // Tombol Reset
      btnReset.addEventListener('click', resetForm);
    });
  </script>
</body>
</html>
