<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>rumah16</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22d3ee;
      --accent2: #a78bfa;
      --danger: #ef4444;
      --ok: #10b981;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: radial-gradient(1200px 800px at 20% 20%, #0b1324, #0a1020 60%, #070b18);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      line-height: 1.6;
      padding: 24px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    body.ready {
      opacity: 1;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
    }
    .back-home {
      text-align: right;
      margin-bottom: 16px;
    }
    .back-home a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .back-home a:hover {
      text-decoration: underline;
    }
    h1 {
      text-align: center;
      font-size: 1.6rem;
      margin: 0 0 20px;
      letter-spacing: 0.2px;
    }
    .card {
      background: linear-gradient(180deg, #121826, #0f1624);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }
    select, input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      background: #0c1220;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 16px;
      box-sizing: border-box;
    }
    select:focus, input:focus {
      border-color: var(--accent);
    }
    button {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      color: #0b1020;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s;
    }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .sheet {
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px;
      margin: 16px 0;
      transition: opacity 0.2s;
    }
    .sheet.filtered-out {
      display: none;
    }
    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .sheet textarea {
      width: 100%;
      min-height: 100px;
      background: #0c1220;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 12px;
      font-family: monospace;
      font-size: 0.95rem;
      resize: none;
      overflow: hidden;
      box-sizing: border-box;
    }
    .sheet textarea:focus {
      border-color: var(--accent);
      outline: none;
    }
    .sheet-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .btn-salin { background: linear-gradient(90deg, var(--ok), #34d399); color: #0b1020; padding: 6px 12px; font-size: 0.9rem; }
    .btn-simpan { background: linear-gradient(90deg, #FF9800, #FFB347); color: #0b1020; padding: 6px 12px; font-size: 0.9rem; }
    .btn-hapus { background: linear-gradient(90deg, var(--danger), #f87171); color: #fff; padding: 6px 12px; font-size: 0.9rem; }
    .status {
      text-align: center;
      min-height: 24px;
      margin: 12px 0;
      font-weight: 600;
    }
    .success { color: var(--ok); }
    .error { color: var(--danger); }
    .info { color: var(--accent); }
    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .toolbar input[type="text"] {
      flex: 1;
      min-width: 200px;
      margin-bottom: 0;
    }
    .counter {
      display: inline-block;
      background: rgba(34, 211, 238, 0.15);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-left: 8px;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-style: italic;
    }
    .loading::before {
      content: "⏳ ";
    }
    .login-form {
      max-width: 400px;
      margin: 60px auto;
    }
    .login-form h2 {
      text-align: center;
      margin-bottom: 24px;
    }
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="back-home">
      <a href="index.html">← Kembali ke Beranda</a>
    </div>

    <!-- Login Form -->
    <div id="loginSection" class="login-form hidden">
      <h2>🔐 Login Required</h2>
      <div class="card">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="email@example.com" />
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Password" />
        <button id="btnLogin" style="width:100%;">Login</button>
        <div id="loginStatus" class="status"></div>
      </div>
    </div>

    <!-- Main Content -->
    <div id="mainSection" class="hidden">
      <h1>rumah16 <span id="counter" class="counter" style="display:none;">0</span></h1>
      <div class="card">
        <label for="marketSelect">Pilih Market</label>
        <select id="marketSelect">
          <option value="">-- Pilih Market --</option>
          <option value="Cambodia">Cambodia</option>
          <option value="Sidney">Sidney</option>
          <option value="China">China</option>
          <option value="Japan">Japan</option>
          <option value="SGP">SGP</option>
          <option value="Taiwan">Taiwan</option>
          <option value="Hongkong">Hongkong</option>
          <option value="Nusa">Nusa</option>
        </select>
        <div class="toolbar">
          <button id="btnTambahLembaran">📄 Tambah Lembaran Kosong</button>
          <input type="text" id="searchInput" placeholder="🔍 Cari di lembaran..." style="display:none;">
        </div>
        <div id="status" class="status"></div>
      </div>
      <div id="lembaranContainer"></div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="./config-firebase.js"></script>

  <script>
    let selectedMarket = null;
    let isLoading = false;
    let currentUser = null;
    let authUnsubscribe = null;
    let appInitialized = false;

    const dirtyState = new WeakMap();

    // ========== ANTI-FLICKER ==========
    // Cegah kedip saat navigasi: sembunyikan body sampai siap
    window.addEventListener('beforeunload', () => {
      document.body.classList.remove('ready');
      if (authUnsubscribe) { authUnsubscribe(); authUnsubscribe = null; }
    });

    function showBody() {
      document.body.classList.add('ready');
    }

    // ========== STATUS ==========
    function showStatus(text, type) {
      type = type || "";
      var el = document.getElementById('status');
      if (!el) return;
      el.textContent = text;
      el.className = "status " + type;
      if (type === "success" || type === "info") {
        setTimeout(function() {
          if (el.textContent === text) el.textContent = "";
        }, 2500);
      }
    }

    function showLoginStatus(text, type) {
      type = type || "";
      var el = document.getElementById('loginStatus');
      if (!el) return;
      el.textContent = text;
      el.className = "status " + type;
    }

    // ========== UTILITAS ==========
    function salinTeks(teks) {
      if (!teks) return showStatus("⚠️ Tidak ada yang disalin.", "error");
      if (navigator.clipboard) {
        navigator.clipboard.writeText(teks).then(function() {
          showStatus("✅ Disalin!", "success");
        }).catch(function() {
          fallbackSalin(teks);
        });
      } else {
        fallbackSalin(teks);
      }
    }

    function fallbackSalin(teks) {
      var ta = document.createElement('textarea');
      ta.value = teks;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        showStatus("✅ Disalin!", "success");
      } catch(e) {
        showStatus("❌ Gagal salin.", "error");
      }
      document.body.removeChild(ta);
    }

    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = textarea.scrollHeight + 'px';
    }

    function updateCounter() {
      var counter = document.getElementById('counter');
      if (!counter) return;
      var visible = document.querySelectorAll('.sheet:not(.filtered-out)').length;
      if (selectedMarket) {
        counter.textContent = visible;
        counter.style.display = 'inline-block';
      } else {
        counter.style.display = 'none';
      }
    }

    // ========== LEMBARAN ==========
    function buatLembaran(isi, key, timestamp) {
      isi = isi || "";
      key = key || null;
      timestamp = timestamp || null;

      var container = document.getElementById('lembaranContainer');
      var sheet = document.createElement('div');
      sheet.className = 'sheet';
      sheet.dataset.key = key || '';

      var waktu = timestamp
        ? new Date(timestamp).toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' })
        : 'Belum disimpan';

      sheet.innerHTML =
        '<div class="sheet-header">' +
          '<span class="sheet-time">' + waktu + '</span>' +
          '<span class="sheet-status" style="color:var(--muted);">—</span>' +
        '</div>' +
        '<textarea placeholder="Ketik atau paste data..."></textarea>' +
        '<div class="sheet-actions">' +
          '<button class="btn-salin">📋 Salin</button>' +
          '<button class="btn-simpan">💾 Simpan</button>' +
          '<button class="btn-hapus" style="display:' + (key ? 'inline-block' : 'none') + ';">🗑️ Hapus</button>' +
        '</div>';

      var textarea = sheet.querySelector('textarea');
      var btnSalin = sheet.querySelector('.btn-salin');
      var btnSimpan = sheet.querySelector('.btn-simpan');
      var btnHapus = sheet.querySelector('.btn-hapus');
      var statusEl = sheet.querySelector('.sheet-status');

      textarea.value = isi;
      setTimeout(function() { autoResize(textarea); }, 0);

      textarea.addEventListener('input', function() {
        autoResize(textarea);
        dirtyState.set(sheet, true);
        statusEl.textContent = '● Belum disimpan';
        statusEl.style.color = '#f59e0b';
      });

      btnSalin.addEventListener('click', function() {
        salinTeks(textarea.value);
      });

      btnSimpan.addEventListener('click', function() {
        if (!selectedMarket) return showStatus("⚠️ Pilih market dulu.", "error");
        if (!textarea.value.trim()) return showStatus("⚠️ Tidak ada data.", "error");

        btnSimpan.disabled = true;
        var originalText = btnSimpan.textContent;
        btnSimpan.textContent = '⏳ Menyimpan...';

        var dataToSave = {
          isi: textarea.value,
          timestamp: firebase.database.ServerValue.TIMESTAMP,
          lastModifiedBy: currentUser ? currentUser.uid : null
        };

        var savePromise;
        if (sheet.dataset.key) {
          savePromise = firebase.database().ref('rumah16/' + selectedMarket + '/' + sheet.dataset.key).set(dataToSave);
        } else {
          var newRef = firebase.database().ref('rumah16/' + selectedMarket).push();
          savePromise = newRef.set(dataToSave).then(function() {
            sheet.dataset.key = newRef.key;
            btnHapus.style.display = 'inline-block';
            var waktuBaru = new Date().toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' });
            sheet.querySelector('.sheet-time').textContent = waktuBaru;
          });
        }

        savePromise.then(function() {
          if (sheet.dataset.key) {
            showStatus("✅ Diperbarui!", "success");
          } else {
            showStatus("✅ Tersimpan!", "success");
          }
          dirtyState.set(sheet, false);
          statusEl.textContent = '● Tersimpan';
          statusEl.style.color = 'var(--ok)';
        }).catch(function(err) {
          console.error("Gagal simpan:", err);
          showStatus("❌ Gagal simpan: " + err.message, "error");
        }).finally(function() {
          btnSimpan.disabled = false;
          btnSimpan.textContent = originalText;
        });
      });

      btnHapus.addEventListener('click', function() {
        if (!sheet.dataset.key) return;
        if (!confirm("Hapus lembaran ini?")) return;

        btnHapus.disabled = true;
        firebase.database().ref('rumah16/' + selectedMarket + '/' + sheet.dataset.key).remove()
          .then(function() {
            sheet.style.opacity = '0';
            setTimeout(function() {
              sheet.remove();
              updateCounter();
            }, 200);
            showStatus("🗑️ Dihapus.", "success");
          })
          .catch(function(err) {
            console.error("Gagal hapus:", err);
            showStatus("❌ Gagal hapus.", "error");
            btnHapus.disabled = false;
          });
      });

      container.appendChild(sheet);
      updateCounter();
      return sheet;
    }

    // ========== MUAT DATA ==========
    function tampilkanLoading() {
      document.getElementById('lembaranContainer').innerHTML = '<div class="loading">Memuat data...</div>';
    }

    function muatDataTersimpan(market) {
      if (!market) return;
      isLoading = true;
      tampilkanLoading();

      firebase.database().ref('rumah16/' + market).once('value')
        .then(function(snapshot) {
          var container = document.getElementById('lembaranContainer');
          container.innerHTML = '';

          if (snapshot.exists()) {
            var data = snapshot.val();
            var entries = Object.keys(data).map(function(key) {
              return {
                key: key,
                isi: data[key].isi || "",
                timestamp: data[key].timestamp || 0
              };
            });
            entries.sort(function(a, b) { return b.timestamp - a.timestamp; });

            entries.forEach(function(entry) {
              buatLembaran(entry.isi, entry.key, entry.timestamp);
            });

            showStatus("📊 " + entries.length + " lembaran dimuat.", "info");
          } else {
            showStatus("📭 Belum ada lembaran di market ini.", "info");
          }
        })
        .catch(function(err) {
          console.error("Gagal muat data:", err);
          showStatus("❌ Gagal memuat data.", "error");
        })
        .finally(function() {
          isLoading = false;
          updateCounter();
        });
    }

    // ========== CEK DIRTY ==========
    function cekDataBelumDisimpan() {
      var sheets = document.querySelectorAll('.sheet');
      for (var i = 0; i < sheets.length; i++) {
        if (dirtyState.get(sheets[i])) return true;
      }
      return false;
    }

    // ========== PENCARIAN ==========
    function setupSearch() {
      var searchInput = document.getElementById('searchInput');
      searchInput.addEventListener('input', function() {
        var keyword = searchInput.value.toLowerCase().trim();
        var sheets = document.querySelectorAll('.sheet');
        sheets.forEach(function(sheet) {
          var text = sheet.querySelector('textarea').value.toLowerCase();
          if (!keyword || text.indexOf(keyword) !== -1) {
            sheet.classList.remove('filtered-out');
          } else {
            sheet.classList.add('filtered-out');
          }
        });
        updateCounter();
      });
    }

    // ========== AUTH UI ==========
    function tampilkanLogin() {
      document.getElementById('loginSection').classList.remove('hidden');
      document.getElementById('mainSection').classList.add('hidden');
      showBody();
    }

    function tampilkanMain() {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('mainSection').classList.remove('hidden');
      showBody();
    }

    function initApp() {
      if (appInitialized) return;
      appInitialized = true;

      var marketSelect = document.getElementById('marketSelect');
      var btnTambah = document.getElementById('btnTambahLembaran');
      var searchInput = document.getElementById('searchInput');

      setupSearch();

      var marketAktif = localStorage.getItem('marketAktif');
      if (marketAktif) {
        marketSelect.value = marketAktif;
        selectedMarket = marketAktif;
        searchInput.style.display = 'block';
        muatDataTersimpan(marketAktif);
      }

      marketSelect.addEventListener('change', function(e) {
        var newMarket = e.target.value;

        if (cekDataBelumDisimpan()) {
          if (!confirm("Ada lembaran yang belum disimpan. Yakin ingin berpindah market?")) {
            marketSelect.value = selectedMarket || '';
            return;
          }
        }

        selectedMarket = newMarket;
        if (selectedMarket) {
          localStorage.setItem('marketAktif', selectedMarket);
          searchInput.style.display = 'block';
          searchInput.value = '';
          muatDataTersimpan(selectedMarket);
        } else {
          localStorage.removeItem('marketAktif');
          searchInput.style.display = 'none';
          document.getElementById('lembaranContainer').innerHTML = '';
          updateCounter();
        }
      });

      btnTambah.addEventListener('click', function() {
        if (!selectedMarket) {
          showStatus("⚠️ Pilih market dulu.", "error");
          return;
        }
        var sheet = buatLembaran();
        sheet.querySelector('textarea').focus();
        sheet.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    }

    // ========== INIT ==========
    document.addEventListener('DOMContentLoaded', function() {
      if (!firebase.apps.length) {
        document.body.classList.add('ready');
        alert("⚠️ Firebase gagal inisialisasi.");
        return;
      }

      var btnLogin = document.getElementById('btnLogin');

      btnLogin.addEventListener('click', function() {
        var email = document.getElementById('loginEmail').value.trim();
        var password = document.getElementById('loginPassword').value;
        if (!email || !password) {
          showLoginStatus("⚠️ Email dan password wajib diisi.", "error");
          return;
        }
        btnLogin.disabled = true;
        btnLogin.textContent = '⏳ Logging in...';

        firebase.auth().signInWithEmailAndPassword(email, password)
          .then(function(cred) {
            currentUser = cred.user;
            tampilkanMain();
            initApp();
          })
          .catch(function(err) {
            console.error("Login error:", err);
            showLoginStatus("❌ " + err.message, "error");
          })
          .finally(function() {
            btnLogin.disabled = false;
            btnLogin.textContent = 'Login';
          });
      });

      // Enter key di password
      document.getElementById('loginPassword').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') btnLogin.click();
      });

      // Auth state listener
      authUnsubscribe = firebase.auth().onAuthStateChanged(function(user) {
        if (user) {
          currentUser = user;
          tampilkanMain();
          initApp();
        } else {
          currentUser = null;
          tampilkanLogin();
        }
      });
    });
  </script>
</body>
</html>
