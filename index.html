<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Rumah Utama</title>
  
  <!-- Firebase SDK (Compat Version) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  
  <!-- Load config-firebase.js eksternal -->
  <script src="./config-firebase.js"></script>
  
  <!-- ✅ Link ke CSS eksternal -->
  <link rel="stylesheet" href="./css/index.css">
</head>
<body>
  <div class="container">
    <!-- User Info Bar -->
    <div class="user-bar">
      <div class="user-info">
        <div class="avatar">👤</div>
        <div class="details">
          <span class="name" id="userName">Loading...</span>
          <span class="role" id="userRole">user</span>
        </div>
      </div>
      <button id="logoutBtn">🚪 Logout</button>
    </div>

    <h1>Rumah Utama</h1>

    <label for="period">Pilih Periode / Market</label>
    <select id="period">
      <option value="">-- Pilih Market --</option>
      <option value="Cambodia">Cambodia</option>
      <option value="Sidney">Sidney</option>
      <option value="China">China</option>
      <option value="SGP">SGP</option>
      <option value="Japan">Japan</option>
      <option value="Taiwan">Taiwan</option>
      <option value="Hongkong">Hongkong</option>
    </select>

    <div id="status"></div>

    <button id="savePeriod">Simpan Periode Aktif</button>
    <button id="resetBtn">Beranda</button>

    <div id="childHouses">
      <h2>Anak Rumah</h2>
      <div class="house-grid" id="houseList"></div>
    </div>
  </div>

  <!-- ✅ Link ke JavaScript eksternal -->
  <script src="./js/index.js"></script>
</body>
</html>
