<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MAINAN ASYIK - Login</title>
  
  <!-- Firebase SDK (Compat Version) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  
  <!-- Load config-firebase.js eksternal -->
  <script src="./config-firebase.js"></script>
  
  <!-- ✅ Link ke CSS eksternal -->
  <link rel="stylesheet" href="./css/pageawal.css">
  
  <!-- ✅ TAMBAHAN: CSS untuk Info Box Rolling -->
  <style>
    .info-box {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      min-height: 80px;
    }
    
    .info-box-content {
      animation: slideIn 0.5s ease-in-out;
    }
    
    @keyframes slideIn {
      from { 
        opacity: 0; 
        transform: translateX(20px); 
      }
      to { 
        opacity: 1; 
        transform: translateX(0); 
      }
    }
    
    .info-loading {
      color: #999;
      font-style: italic;
      font-size: 12px;
    }
    
    .info-indicator {
      position: absolute;
      bottom: 8px;
      right: 12px;
      font-size: 10px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="header">SEBATAS PREDIKSI <span>semoga hoki</span></div>

  <div class="main-content">
    <h1 class="page-title">Login Untuk Masuk</h1>

    <div class="login-box">
      <form id="loginForm">
        <div class="form-group">
          <span class="form-icon">👤</span>
          <input type="email" id="email" class="form-control" placeholder="Alamat Email" required>
        </div>
        <div class="form-group">
          <span class="form-icon">🔒</span>
          <input type="password" id="password" class="form-control" placeholder="Password" required>
        </div>
        <div class="form-group">
          <div class="captcha-box">
            <span class="form-icon">🔢</span>
            <input type="text" id="captchaInput" class="form-control" placeholder="Captcha" required>
            <div class="captcha-image" id="captchaDisplay">69554</div>
            <button type="button" class="refresh-captcha" onclick="refreshCaptcha()">🔄</button>
          </div>
        </div>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <div class="button-group">
          <button type="button" class="btn btn-secondary" onclick="forgotPassword()">Lupa Password</button>
          <button type="button" class="btn btn-primary" id="btnSignIn">Sign In</button>
        </div>
      </form>
    </div>

    <!-- ✅ DIPERBAIKI: Info Box dengan ID untuk JavaScript -->
    <div class="info-box" id="infoBox">
      <div class="info-title" id="infoTitle">📢 Memuat pengumuman...</div>
      <div class="info-text" id="infoText">Mohon tunggu sebentar</div>
      <div class="info-indicator" id="infoIndicator"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="pageawal.html" class="nav-item active"><span class="nav-icon">🏠</span><span class="nav-label">BERANDA</span></a>
    <a href="#" class="nav-item" id="navDaftar"><span class="nav-icon">✍️</span><span class="nav-label">DAFTAR</span></a>
    <a href="#" class="nav-item" id="navEksplor"><span class="nav-icon">🎁</span><span class="nav-label">EKSPLOR</span></a>
    <a href="#" class="nav-item"><span class="nav-icon">💬</span><span class="nav-label">LIVECHAT</span></a>
  </nav>

  <div class="loading" id="loading"><div class="spinner"></div></div>

  <!-- ✅ Link ke JavaScript eksternal -->
  <script src="./js/pageawal.js"></script>
  
  <!-- ✅ TAMBAHAN: Script untuk Load Info Box Rolling dari Firebase -->
  <script>
    // === FUNGSI LOAD INFO BOX DARI FIREBASE ===
    async function loadInfoBox() {
      const infoTitle = document.getElementById('infoTitle');
      const infoText = document.getElementById('infoText');
      const infoBox = document.getElementById('infoBox');
      const infoIndicator = document.getElementById('infoIndicator');
      
      try {
        console.log('📥 Memuat pengumuman dari Firebase...');
        
        // Load dari Firebase (path yang sama dengan admin simpan)
        const snapshot = await firebase.database().ref('infoBox/announcements').once('value');
        
        if (!snapshot.exists()) {
          console.log('ℹ️ Tidak ada pengumuman di Firebase');
          showDefaultInfo();
          return;
        }
        
        const announcements = snapshot.val();
        
        if (!Array.isArray(announcements) || announcements.length === 0) {
          console.log('ℹ️ Pengumuman kosong atau bukan array');
          showDefaultInfo();
          return;
        }
        
        console.log(`✅ ${announcements.length} pengumuman dimuat dari Firebase`);
        
        // Rotasi pengumuman setiap 5 detik
        let currentIndex = 0;
        
        function showAnnouncement(index) {
          const ann = announcements[index];
          
          // Update indikator (misal: "1/3")
          infoIndicator.textContent = `${index + 1}/${announcements.length}`;
          
          // Update konten dengan animasi
          infoBox.classList.remove('info-box-content');
          void infoBox.offsetWidth; // Trigger reflow untuk restart animasi
          infoBox.classList.add('info-box-content');
          
          infoTitle.textContent = ann.title || '📢 Pengumuman';
          infoText.textContent = ann.content || '';
        }
        
        // Tampilkan pengumuman pertama
        showAnnouncement(0);
        
        // Jika ada lebih dari 1 pengumuman, rotasi otomatis
        if (announcements.length > 1) {
          setInterval(() => {
            currentIndex = (currentIndex + 1) % announcements.length;
            showAnnouncement(currentIndex);
          }, 120000); // Ganti setiap 2 menit
        }
        
      } catch (error) {
        console.error('❌ Gagal load info box:', error);
        showDefaultInfo();
      }
    }
    
    // === FUNGSI TAMPILKAN INFO DEFAULT ===
    function showDefaultInfo() {
      const infoTitle = document.getElementById('infoTitle');
      const infoText = document.getElementById('infoText');
      const infoIndicator = document.getElementById('infoIndicator');
      
      infoTitle.textContent = '📢 SEBATAS HOBI';
      infoText.textContent = 'Ck keputusan ada di ujung jari anda';
      infoIndicator.textContent = '';
    }
    
    // Load info box saat halaman selesai dimuat
    window.addEventListener('load', loadInfoBox);
  </script>
</body>
</html>
